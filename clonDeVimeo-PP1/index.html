<!DOCTYPE html>
<html lang="es">
<head>

    <title>vimeo</title>
    <link rel="stylesheet" href="estilo.css">
</head>

        <h1>vimeo</h1>

            <div class="join">Join</div>

        </nav>
    </header>
    <main>
        <div class="introduccion">
            <div class="introduccionContenido">
                <h3>Su plataforma de video completa</h3>
