<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión Animaciones</title>
    <style>
        body{
            
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        #menu{
            display: flex;
            list-style: none;
            padding: 10px;
            gap: 20px;

        }
        #menu li{
            padding: 10px;
            background-color: rgba(10, 10, 10, 0.918);
            color: white;
            border-radius: 10px;
            transition: all 0.8s ease;
        }
        #menu li:hover{
            background-color: rgba(255, 255, 255, 0.918);
            color: black;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .rombo{
            margin: 100px;
            transform: rotate(45deg);
            width: 200px;
            height: 200px;
            color: white;
            background-color: rgba(10, 10, 10, 0.918);
            transition: all 0.3s ease;
            &:hover{
                transform: rotate(-90deg);
                
            }
        }
        .rombo p{
            transform: rotate(-45deg);
            text-align: center;
            line-height: 200px;
            font-size: 50px;
            transition: all 0.3s ease;
            &:hover{
                transform: rotate(+90deg);
                
            }
        }
        .flecha{
            width: 200px;
            height: fit-content;
            background-color: rgba(10, 10, 10, 0.918);
            position: relative;
            
            
        }
        .flecha p{
            text-align: center;
            font-size: 50px;
            color: white;
            position: relative;
            left: -150px;
            transition: all 0.5s ease;
            
        }
        .flecha:hover p{
            left: 0px;
            
        }
        
        


    </style>
</head>
<body>
    <nav>
        <ul id="menu">
            <li>Home</li>
            <li>Estado</li>
            <li>Clase</li>
        </ul>
    </nav>
    <h1>Sesión Animaciones</h1>

    <div class="rombo">
        <p >1</p>
    </div>
    <div class="flecha">
        <p>→</p>
    </div>
</body>
</html>
