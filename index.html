<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indice DISEÑO</title>
    <style>
    /* Estilos dark, full-screen */
    :root {
        --card-bg: rgba(6,12,18,0.6);
        --glass-border: rgba(255,255,255,0.04);
        --muted: #9fb2c8;
        --radius: 14px;
    }

    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 36px;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        color: #dfeffb;
        background: linear-gradient(135deg, #04121b 0%, #071827 60%);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
    }

    main {
        width: min(920px, 96%);
        background: var(--card-bg);
        backdrop-filter: blur(8px) saturate(115%);
        border-radius: var(--radius);
        padding: 34px 36px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        border: 1px solid var(--glass-border);
    }

    h1 {
        margin: 0 0 18px 0;
        font-size: 1.9rem;
        letter-spacing: 0.25px;
        color: #ffffff;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
    }

    li {
        margin: 0;
    }

    a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-decoration: none;
        padding: 14px 18px;
        border-radius: 12px;
        color: #d8eefb;
        background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        border: 1px solid rgba(255,255,255,0.03);
        box-shadow: none;
        transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .12s ease;
        font-weight: 600;
    }

    a:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.45);
        color: #fff;
    }

    a:hover .meta {
        color: #fff;
    }

    a:active {
        transform: translateY(-2px);
    }

    .meta {
        font-weight: 500;
        font-size: 0.92rem;
        color: var(--muted);
    }

    /* Accesibilidad: foco visible */
    a:focus {
        outline: 3px solid rgba(11,107,255,0.15);
        outline-offset: 4px;
    }
</style>

</head>
<body>
    <h1>Proyectos M0615 - DISEÑO</h1>

    <ul>
        <li><a href="clonDeVimeo-PP1/index.html">VIMEO<span class="meta">Abrir</span></a></li>
        
    </ul>

</body>
</html>
